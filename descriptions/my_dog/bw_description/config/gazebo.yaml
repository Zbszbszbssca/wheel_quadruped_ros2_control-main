# Controller Manager configuration
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    # Define the available controllers
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    ocs2_quadruped_controller:
      type: ocs2_quadruped_controller/Ocs2QuadrupedController

    rl_quadruped_controller:
      type: rl_quadruped_controller/LeggedGymController

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: "imu_sensor"
    frame_id: "imu_link"

ocs2_quadruped_controller:
  ros__parameters:
    update_rate: 200  # Hz
    robot_pkg: "bw_description"
    default_kd: 5.5
    feet_force_threshold: 4.0
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FL_foot_joint 
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - FR_foot_joint      
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RL_foot_joint       
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
      - RR_foot_joint      


    command_interfaces:
      - effort
      - position
      - velocity
      - kp
      - kd

    state_interfaces:
      - effort
      - position
      - velocity

    feet:
      - FL_foot
      - FR_foot
      - RL_foot
      - RR_foot

    imu_name: "imu_sensor"
    base_name: "base"

    imu_interfaces:
      - orientation.w
      - orientation.x
      - orientation.y
      - orientation.z
      - angular_velocity.x
      - angular_velocity.y
      - angular_velocity.z
      - linear_acceleration.x
      - linear_acceleration.y
      - linear_acceleration.z

    foot_force_name: "foot_force"
    foot_force_interfaces:
      - FL_foot_force
      - RL_foot_force
      - FR_foot_force
      - RR_foot_force

rl_quadruped_controller:
  ros__parameters:
    update_rate: 200  # Hz
    robot_pkg: "bw_description"
    model_folder: "robot_lab"
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FL_foot_joint 
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - FR_foot_joint      
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RL_foot_joint       
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
      - RR_foot_joint    

    command_interfaces:
      - effort
      - position
      - velocity
      - kp
      - kd

    state_interfaces:
      - effort
      - position
      - velocity
    
    down_pos:
      - 0.01
      - 1.27
      - -2.8
      - 0.00      
      - -0.01
      - 1.27
      - -2.8
      - 0.00 
      - 0.3
      - 1.31
      - -2.8
      - 0.00 
      - -0.3
      - 1.31
      - -2.8
      - 0.00 

    stand_pos:
      - 0.0
      - 0.8
      - -1.5
      - 0.00 
      - 0.0
      - 0.8
      - -1.5
      - 0.00 
      - 0.0
      - 0.8
      - -1.5
      - 0.00 
      - 0.0
      - 0.8
      - -1.5
      - 0.00 

    imu_name: "imu_sensor"
    imu_interfaces:
      - orientation.w
      - orientation.x
      - orientation.y
      - orientation.z
      - angular_velocity.x
